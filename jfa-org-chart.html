<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jazz Forum Arts — Organizational Chart</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap');

  @font-face {
    font-family: 'Norwester';
    src: url('https://cdn.jsdelivr.net/gh/jamiewilson/predawn@master/fonts/norwester.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
  }

  :root {
    --jfa-black: #000000;
    --jfa-gray: #2D2D2D;
    --jfa-turquoise: #008DB9;
    --jfa-white: #FFFFFF;
    --jfa-open: #C75000;
    --line-color: #555555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--jfa-black);
    color: var(--jfa-white);
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    min-height: 100vh;
    overflow-x: auto;
  }

  header {
    padding: 32px 40px 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  header .logo-text {
    font-family: 'Norwester', Impact, 'Arial Black', sans-serif;
    text-transform: uppercase;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--jfa-turquoise);
  }

  header .subtitle {
    font-family: 'Norwester', Impact, 'Arial Black', sans-serif;
    text-transform: uppercase;
    font-size: 16px;
    letter-spacing: 1px;
    color: var(--jfa-white);
    opacity: 0.7;
  }

  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .toggle-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .toggle-label.active { color: var(--jfa-turquoise); }

  .toggle-switch {
    position: relative;
    width: 48px;
    height: 26px;
    background: var(--jfa-gray);
    border: 2px solid #555;
    cursor: pointer;
    border-radius: 0;
    transition: background 0.2s;
  }

  .toggle-switch.on {
    background: var(--jfa-turquoise);
    border-color: var(--jfa-turquoise);
  }

  .toggle-switch .knob {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 18px;
    height: 18px;
    background: var(--jfa-white);
    border-radius: 0;
    transition: left 0.2s;
  }

  .toggle-switch.on .knob { left: 24px; }

  h1 {
    font-family: 'Norwester', Impact, 'Arial Black', sans-serif;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 32px;
    text-align: center;
    padding: 28px 0 8px 0;
    color: var(--jfa-white);
  }

  .chart-wrapper {
    width: 100%;
    overflow-x: auto;
    padding: 0 20px 20px 20px;
  }

  svg.org-chart { display: block; margin: 0 auto; }

  /* ——— Footer ——— */
  .payroll-footer {
    background: var(--jfa-gray);
    text-align: center;
    padding: 22px 20px;
    margin-top: 12px;
    border-radius: 0;
  }

  .payroll-footer .label {
    font-family: 'Norwester', Impact, 'Arial Black', sans-serif;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-size: 15px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 6px;
  }

  .payroll-footer .amount {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: var(--jfa-turquoise);
  }

  .payroll-footer .budget {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
  }

  .payroll-footer .bar-track {
    width: 340px;
    max-width: 90%;
    height: 10px;
    background: rgba(255,255,255,0.12);
    margin: 12px auto 0 auto;
    border-radius: 0;
    overflow: hidden;
  }

  .payroll-footer .bar-fill {
    height: 100%;
    background: var(--jfa-turquoise);
    border-radius: 0;
    transition: width 0.4s ease;
  }

  .payroll-footer .breakdown {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 14px;
    flex-wrap: wrap;
  }

  .payroll-footer .breakdown .item {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    color: rgba(255,255,255,0.45);
  }

  .payroll-footer .breakdown .item strong {
    color: rgba(255,255,255,0.75);
    font-weight: 600;
  }

  /* ——— Tooltip ——— */
  .tooltip {
    position: fixed;
    pointer-events: none;
    background: var(--jfa-gray);
    border: 2px solid var(--jfa-turquoise);
    color: var(--jfa-white);
    padding: 12px 16px;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 500;
    max-width: 280px;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.15s;
    border-radius: 0;
    line-height: 1.6;
  }
  .tooltip.visible { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="logo-text">Jazz Forum Arts</span>
    <span class="subtitle">Tarrytown, NY</span>
  </div>
  <div class="toggle-wrap">
    <span class="toggle-label active" id="labelBase">Base</span>
    <div class="toggle-switch" id="costToggle" onclick="toggleView()">
      <div class="knob"></div>
    </div>
    <span class="toggle-label" id="labelLoaded">Fully Loaded</span>
  </div>
</header>

<h1>Organizational Chart</h1>

<div class="chart-wrapper">
  <svg class="org-chart" id="orgSvg" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div class="payroll-footer">
  <div class="label">Total Annual Payroll</div>
  <div class="amount" id="footerAmount">$851,860</div>
  <div class="budget" id="footerBudget">of $1,000,000 budget cap · 85.2% utilized · $148,140 remaining</div>
  <div class="bar-track"><div class="bar-fill" id="footerBar"></div></div>
  <div class="breakdown" id="footerBreakdown"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
(function () {
  const TURQUOISE = '#008DB9';
  const GRAY      = '#2D2D2D';
  const OPEN_CLR  = '#C75000';
  const WHITE     = '#FFFFFF';
  const LINE_CLR  = '#555555';

  /* ——————————————————————————————————
     DATA — base + loaded costs
  —————————————————————————————————— */
  const nodes = [
    { id: 'board', name: 'Board of Directors', title: '', salary: '', loadedSalary: '', color: TURQUOISE, textColor: WHITE, parent: null, note: 'Governing body', type: '' },
    { id: 'ed', name: 'Darrian', title: 'Executive Director', salary: '$120,000', loadedSalary: '$131,514', color: TURQUOISE, textColor: WHITE, parent: 'board', note: 'W-2 · FICA $9,180 · FUTA $42 · SUTA $492 · WC $1,800', type: 'W-2', baseCost: 120000, loadedCost: 131514 },
    { id: 'coo', name: 'Clara', title: 'Chief Operating Officer', salary: '$120,000', loadedSalary: '$131,514', color: TURQUOISE, textColor: WHITE, parent: 'board', note: 'W-2 · FICA $9,180 · FUTA $42 · SUTA $492 · WC $1,800', type: 'W-2', baseCost: 120000, loadedCost: 131514 },
    { id: 'dev', name: 'Open Hire', title: 'Development Manager', salary: '$85,000', loadedSalary: '$93,311', color: OPEN_CLR, textColor: WHITE, parent: 'ed', note: 'Position unfilled · W-2 · FICA $6,502 · FUTA $42 · SUTA $492 · WC $1,275', type: 'W-2', baseCost: 85000, loadedCost: 93311 },
    { id: 'edu', name: 'Giulia', title: 'Education & Programs Coord.', salary: '$62,400', loadedSalary: '$68,644', color: GRAY, textColor: WHITE, parent: 'ed', note: 'W-2 · FICA $4,774 · FUTA $42 · SUTA $492 · WC $936', type: 'W-2', baseCost: 62400, loadedCost: 68644 },
    { id: 'cam', name: 'Cam', title: 'Sound Engineer', salary: '$17,600', loadedSalary: '$17,600', color: GRAY, textColor: WHITE, parent: 'ed', note: '1099 Contractor · No employer taxes', type: '1099', baseCost: 17600, loadedCost: 17600 },
    { id: 'johne', name: 'John', title: 'Sound Engineer', salary: '$8,800', loadedSalary: '$8,800', color: GRAY, textColor: WHITE, parent: 'ed', note: '1099 Contractor · No employer taxes', type: '1099', baseCost: 8800, loadedCost: 8800 },
    { id: 'cfo', name: 'External', title: 'Fractional CFO', salary: '$78,000', loadedSalary: '$78,000', color: GRAY, textColor: WHITE, parent: 'ed', note: '1099 Contractor · No employer taxes', type: '1099', baseCost: 78000, loadedCost: 78000 },
    { id: 'neal', name: 'Neal', title: 'Education Staff', salary: '$48,000', loadedSalary: '$48,000', color: GRAY, textColor: WHITE, parent: 'edu', note: '1099 Contractor · No employer taxes', type: '1099', baseCost: 48000, loadedCost: 48000 },
    { id: 'boyce', name: 'Boyce', title: 'Education Staff', salary: '$48,000', loadedSalary: '$48,000', color: GRAY, textColor: WHITE, parent: 'edu', note: '1099 Contractor · No employer taxes', type: '1099', baseCost: 48000, loadedCost: 48000 },
    { id: 'ops', name: 'Isak', title: 'Ops & Marketing Manager', salary: '$102,000', loadedSalary: '$102,000', color: GRAY, textColor: WHITE, parent: 'coo', note: 'W-2 · Remote Amsterdam · $102K all-in (taxes included)', type: 'W-2 All-in', baseCost: 102000, loadedCost: 102000 },
    { id: 'chef', name: 'John', title: 'Chef', salary: '$85,100', loadedSalary: '$93,420', color: GRAY, textColor: WHITE, parent: 'coo', note: 'W-2 · Incl. $2K bonus · FICA $6,510 · FUTA $42 · SUTA $492 · WC $1,276', type: 'W-2', baseCost: 85100, loadedCost: 93420 },
    { id: 'foh', name: 'Aerial', title: 'FOH Manager', salary: '$76,960', loadedSalary: '$84,535', color: GRAY, textColor: WHITE, parent: 'coo', note: 'W-2 · FICA $5,887 · FUTA $42 · SUTA $492 · WC $1,154', type: 'W-2', baseCost: 76960, loadedCost: 84535 },
    { id: 'bohstaff', name: 'BOH Staff', title: 'Kitchen · Prep · Dishwashers', salary: '', loadedSalary: '', color: GRAY, textColor: WHITE, parent: 'chef', note: 'Variable / hourly', type: '', baseCost: 0, loadedCost: 0 },
    { id: 'fohstaff', name: 'FOH Staff', title: 'Waiters · Bussers · Bartenders', salary: '', loadedSalary: '', color: GRAY, textColor: WHITE, parent: 'foh', note: 'Variable / hourly', type: '', baseCost: 0, loadedCost: 0 },
  ];

  const BASE_TOTAL = 851860;
  const LOADED_TOTAL = 905338;
  const BUDGET = 1000000;
  const EMPLOYER_TAX_TOTAL = LOADED_TOTAL - BASE_TOTAL;

  /* ——————————————————————————————————
     STATE
  —————————————————————————————————— */
  let showLoaded = false;

  /* ——————————————————————————————————
     LAYOUT
  —————————————————————————————————— */
  const BOX_W = 186, BOX_H = 84, H_GAP = 28, V_GAP = 60;
  const BOARD_W = 220, BOARD_H = 52;
  const LEADER_W = 204, LEADER_H = 84;

  const childrenOf = {};
  nodes.forEach(n => { childrenOf[n.id] = []; });
  nodes.forEach(n => { if (n.parent) childrenOf[n.parent].push(n.id); });

  const nodeMap = {};
  nodes.forEach(n => { nodeMap[n.id] = n; });

  function subtreeWidth(id) {
    const kids = childrenOf[id];
    if (kids.length === 0) return BOX_W;
    let total = 0;
    kids.forEach((k, i) => {
      total += subtreeWidth(k);
      if (i < kids.length - 1) total += H_GAP;
    });
    return Math.max(BOX_W, total);
  }

  const pos = {};

  function layoutChildren(parentId, cx, y) {
    const kids = childrenOf[parentId];
    if (kids.length === 0) return;
    let totalW = 0;
    kids.forEach((k, i) => {
      totalW += subtreeWidth(k);
      if (i < kids.length - 1) totalW += H_GAP;
    });
    let startX = cx - totalW / 2;
    kids.forEach(k => {
      const sw = subtreeWidth(k);
      const childCx = startX + sw / 2;
      const w = BOX_W, h = BOX_H;
      pos[k] = { x: childCx - w / 2, y, w, h, cx: childCx, cy: y + h / 2 };
      layoutChildren(k, childCx, y + h + V_GAP);
      startX += sw + H_GAP;
    });
  }

  const edSubW = subtreeWidth('ed');
  const cooSubW = subtreeWidth('coo');
  const canvasCx = Math.max((edSubW + H_GAP + cooSubW) / 2 + 40, 600);

  pos['board'] = { x: canvasCx - BOARD_W / 2, y: 20, w: BOARD_W, h: BOARD_H, cx: canvasCx, cy: 20 + BOARD_H / 2 };

  const leaderY = 20 + BOARD_H + V_GAP;
  const edCx = canvasCx - (edSubW / 2 + H_GAP / 2 + cooSubW / 2) + edSubW / 2;
  const cooCx = edCx + edSubW / 2 + H_GAP + cooSubW / 2;

  pos['ed'] = { x: edCx - LEADER_W / 2, y: leaderY, w: LEADER_W, h: LEADER_H, cx: edCx, cy: leaderY + LEADER_H / 2 };
  pos['coo'] = { x: cooCx - LEADER_W / 2, y: leaderY, w: LEADER_W, h: LEADER_H, cx: cooCx, cy: leaderY + LEADER_H / 2 };

  layoutChildren('ed', edCx, leaderY + LEADER_H + V_GAP);
  layoutChildren('coo', cooCx, leaderY + LEADER_H + V_GAP);

  /* ——————————————————————————————————
     RENDER
  —————————————————————————————————— */
  let minX = Infinity, maxX = -Infinity, maxY = -Infinity;
  Object.values(pos).forEach(p => {
    if (p.x < minX) minX = p.x;
    if (p.x + p.w > maxX) maxX = p.x + p.w;
    if (p.y + p.h > maxY) maxY = p.y + p.h;
  });
  const PAD = 30;
  const svgW = maxX - minX + PAD * 2;
  const svgH = maxY + PAD * 2 + 70; // extra for legend

  const svg = document.getElementById('orgSvg');
  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  svg.setAttribute('viewBox', `${minX - PAD} ${-PAD} ${svgW} ${svgH}`);

  function svgEl(tag, attrs) {
    const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);
    return el;
  }

  // Connector lines
  const linesG = svgEl('g', {});
  svg.appendChild(linesG);
  nodes.forEach(n => {
    if (!n.parent) return;
    const p = pos[n.parent], c = pos[n.id];
    if (!p || !c) return;
    const midY = p.y + p.h + (c.y - p.y - p.h) / 2;
    linesG.appendChild(svgEl('path', {
      d: `M ${p.cx} ${p.y + p.h} L ${p.cx} ${midY} L ${c.cx} ${midY} L ${c.cx} ${c.y}`,
      stroke: LINE_CLR, 'stroke-width': '2', fill: 'none'
    }));
  });

  // Boxes
  const boxesG = svgEl('g', {});
  svg.appendChild(boxesG);
  const tooltip = document.getElementById('tooltip');

  // Store salary text elements for toggling
  const salaryTexts = {};

  nodes.forEach(n => {
    const p = pos[n.id];
    if (!p) return;
    const g = svgEl('g', { 'data-id': n.id, style: 'cursor:pointer' });

    // Shadow
    g.appendChild(svgEl('rect', { x: p.x + 3, y: p.y + 3, width: p.w, height: p.h, fill: 'rgba(0,0,0,0.35)', rx: 0 }));

    // Box
    let stroke = 'none', strokeW = '0';
    if (n.id === 'dev') { stroke = OPEN_CLR; strokeW = '2'; }
    g.appendChild(svgEl('rect', { x: p.x, y: p.y, width: p.w, height: p.h, fill: n.color, rx: 0, stroke, 'stroke-width': strokeW }));

    // Diagonal hatch for open hire
    if (n.id === 'dev') {
      const defs = svgEl('defs', {});
      const pat = svgEl('pattern', { id: 'diag', width: 8, height: 8, patternUnits: 'userSpaceOnUse', patternTransform: 'rotate(45)' });
      pat.appendChild(svgEl('line', { x1: 0, y1: 0, x2: 0, y2: 8, stroke: 'rgba(255,255,255,0.06)', 'stroke-width': 4 }));
      defs.appendChild(pat);
      g.appendChild(defs);
      g.appendChild(svgEl('rect', { x: p.x, y: p.y, width: p.w, height: p.h, fill: 'url(#diag)', rx: 0 }));
    }

    // W-2 / 1099 badge
    if (n.type && n.id !== 'board') {
      const badgeW = n.type.length * 7 + 12;
      const badgeColor = n.type === '1099' ? 'rgba(255,255,255,0.15)' : 'rgba(0,141,185,0.35)';
      g.appendChild(svgEl('rect', { x: p.x + p.w - badgeW - 4, y: p.y + 4, width: badgeW, height: 16, fill: badgeColor, rx: 0 }));
      const bt = svgEl('text', {
        x: p.x + p.w - badgeW / 2 - 4, y: p.y + 15,
        'text-anchor': 'middle', fill: WHITE, 'font-family': "'Montserrat', sans-serif",
        'font-size': '9', 'font-weight': '700', 'letter-spacing': '0.5px'
      });
      bt.textContent = n.type;
      g.appendChild(bt);
    }

    // Text lines
    const isBoard = n.id === 'board';
    const fontSize = isBoard ? 14 : 12;
    const lineH = isBoard ? 18 : 16;
    const lines = [];
    if (n.name) lines.push({ text: n.name, bold: true });
    if (n.title) lines.push({ text: n.title, bold: false });

    const hasSalary = !!n.salary;
    const totalLines = lines.length + (hasSalary ? 1 : 0);
    const totalTextH = totalLines * lineH;
    let textY = p.y + (p.h - totalTextH) / 2 + lineH * 0.75;

    lines.forEach(l => {
      const txt = svgEl('text', {
        x: p.cx, y: textY, 'text-anchor': 'middle', fill: n.textColor,
        'font-family': l.bold ? "'Norwester', Impact, 'Arial Black', sans-serif" : "'Montserrat', sans-serif",
        'font-size': l.bold ? fontSize + 1 : fontSize - 1,
        'font-weight': l.bold ? 'normal' : '500',
        'text-transform': l.bold ? 'uppercase' : 'none',
        'letter-spacing': l.bold ? '0.5px' : '0'
      });
      txt.textContent = l.text;
      g.appendChild(txt);
      textY += lineH;
    });

    // Salary text (swappable)
    if (hasSalary) {
      const salTxt = svgEl('text', {
        x: p.cx, y: textY, 'text-anchor': 'middle', fill: n.textColor,
        'font-family': "'Montserrat', sans-serif", 'font-size': fontSize - 1,
        'font-weight': '600', opacity: '0.9'
      });
      salTxt.textContent = n.salary;
      g.appendChild(salTxt);
      salaryTexts[n.id] = { el: salTxt, base: n.salary, loaded: n.loadedSalary };
    }

    // Hover
    g.addEventListener('mouseenter', (e) => {
      const nd = nodeMap[n.id];
      let html = `<strong style="color:${TURQUOISE};font-size:14px">${nd.name}</strong>`;
      if (nd.title) html += `<br>${nd.title}`;
      if (nd.type) html += `<br><span style="color:rgba(255,255,255,0.5)">${nd.type}</span>`;
      if (nd.salary) {
        html += `<br>Base salary: ${nd.salary}`;
        if (nd.loadedSalary && nd.loadedSalary !== nd.salary) {
          html += `<br>Fully loaded: <strong style="color:${TURQUOISE}">${nd.loadedSalary}</strong>`;
        }
      }
      if (nd.note) html += `<br><em style="color:rgba(255,255,255,0.55);font-size:11px">${nd.note}</em>`;
      const kids = childrenOf[n.id];
      if (kids.length) html += `<br>Direct reports: ${kids.length}`;
      tooltip.innerHTML = html;
      tooltip.classList.add('visible');
    });
    g.addEventListener('mousemove', (e) => {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY + 14) + 'px';
    });
    g.addEventListener('mouseleave', () => { tooltip.classList.remove('visible'); });

    boxesG.appendChild(g);
  });

  // Legend
  const legY = maxY + 20;
  const legX = minX;
  const legG = svgEl('g', {});
  svg.appendChild(legG);

  const legendItems = [
    { color: TURQUOISE, label: 'Board / Leadership' },
    { color: OPEN_CLR, label: 'Open Position' },
    { color: GRAY, label: 'Staff' },
  ];

  legendItems.forEach((item, i) => {
    const xOff = i * 180;
    legG.appendChild(svgEl('rect', { x: legX + xOff, y: legY, width: 14, height: 14, fill: item.color, rx: 0 }));
    const t = svgEl('text', { x: legX + xOff + 22, y: legY + 12, fill: WHITE, 'font-family': "'Montserrat', sans-serif", 'font-size': '12', 'font-weight': '500' });
    t.textContent = item.label;
    legG.appendChild(t);
  });

  /* ——————————————————————————————————
     TOGGLE BASE / LOADED
  —————————————————————————————————— */
  function updateView() {
    const total = showLoaded ? LOADED_TOTAL : BASE_TOTAL;
    const pct = (total / BUDGET * 100).toFixed(1);
    const remaining = BUDGET - total;

    // Update salary texts on boxes
    for (const [id, obj] of Object.entries(salaryTexts)) {
      obj.el.textContent = showLoaded ? obj.loaded : obj.base;
    }

    // Update footer
    document.getElementById('footerAmount').textContent = '$' + total.toLocaleString();
    document.getElementById('footerBudget').textContent =
      `of $1,000,000 budget cap · ${pct}% utilized · $${remaining.toLocaleString()} remaining`;
    document.getElementById('footerBar').style.width = pct + '%';

    // Breakdown
    const bk = document.getElementById('footerBreakdown');
    if (showLoaded) {
      bk.innerHTML =
        `<span class="item"><strong>Base salaries:</strong> $${BASE_TOTAL.toLocaleString()}</span>` +
        `<span class="item"><strong>Employer taxes:</strong> $${EMPLOYER_TAX_TOTAL.toLocaleString()}</span>` +
        `<span class="item"><strong>W-2 employees:</strong> 7</span>` +
        `<span class="item"><strong>1099 contractors:</strong> 5</span>`;
    } else {
      bk.innerHTML =
        `<span class="item"><strong>W-2 employees:</strong> 7</span>` +
        `<span class="item"><strong>1099 contractors:</strong> 5</span>`;
    }

    // Toggle UI
    const tog = document.getElementById('costToggle');
    const lblBase = document.getElementById('labelBase');
    const lblLoaded = document.getElementById('labelLoaded');
    if (showLoaded) {
      tog.classList.add('on');
      lblBase.classList.remove('active');
      lblLoaded.classList.add('active');
    } else {
      tog.classList.remove('on');
      lblBase.classList.add('active');
      lblLoaded.classList.remove('active');
    }
  }

  window.toggleView = function () {
    showLoaded = !showLoaded;
    updateView();
  };

  // Initial render
  updateView();
})();
</script>
</body>
</html>
