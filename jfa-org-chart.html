<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jazz Forum Arts — Organizational Chart</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap');

@font-face {
  font-family: 'Norwester';
  src: url('https://cdn.jsdelivr.net/gh/jamiewilson/predawn@master/fonts/norwester.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
}

:root {
  --jfa-black: #000000;
  --jfa-gray: #2D2D2D;
  --jfa-turquoise: #008DB9;
  --jfa-turquoise-light: #E6F5FA;
  --jfa-turquoise-mid: #B3E0ED;
  --jfa-white: #FFFFFF;
  --jfa-bg: #F4F6F8;
  --jfa-card-bg: #FFFFFF;
  --jfa-text: #1A1A1A;
  --jfa-text-secondary: #555555;
  --jfa-border: #D9DDE3;

  --dept-leadership: #008DB9;
  --dept-education: #2E8B57;
  --dept-operations: #D4760A;
  --dept-fb: #B5395B;
  --dept-finance: #6B5B95;
  --dept-sound: #4A7C96;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background-color: var(--jfa-bg);
  color: var(--jfa-text);
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  min-height: 100vh;
}

h1, h2, h3, h4 {
  font-family: 'Norwester', Impact, 'Arial Black', sans-serif;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--jfa-black) 0%, var(--jfa-gray) 100%);
  color: var(--jfa-white);
  padding: 20px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
}

.header-left { display: flex; align-items: center; gap: 20px; }

.logo {
  font-family: 'Norwester', Impact, sans-serif;
  font-size: 22px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--jfa-turquoise);
  line-height: 1.1;
}

.logo span {
  color: var(--jfa-white);
  font-size: 12px;
  display: block;
  letter-spacing: 3px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 600;
}

.header h1 { font-size: 20px; letter-spacing: 2px; font-weight: normal; }

.header-controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

.search-box { position: relative; }

.search-box input {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 0;
  color: var(--jfa-white);
  padding: 8px 12px 8px 34px;
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
  width: 220px;
  outline: none;
  transition: all 0.2s;
}

.search-box input::placeholder { color: rgba(255,255,255,0.5); }
.search-box input:focus { border-color: var(--jfa-turquoise); background: rgba(255,255,255,0.18); }

.search-box svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: 0.5;
}

.toggle-btn {
  background: rgba(255,255,255,0.1);
  color: var(--jfa-white);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 0;
  padding: 8px 16px;
  font-family: 'Montserrat', sans-serif;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}

.toggle-btn:hover { background: rgba(255,255,255,0.2); }
.toggle-btn.active { background: var(--jfa-turquoise); border-color: var(--jfa-turquoise); }

/* Summary bar */
.summary-bar {
  background: var(--jfa-white);
  border-bottom: 1px solid var(--jfa-border);
  padding: 14px 32px;
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
  align-items: center;
}

.summary-stat { display: flex; flex-direction: column; }

.summary-stat .label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--jfa-text-secondary); font-weight: 600;
}

.summary-stat .value { font-size: 18px; font-weight: 700; color: var(--jfa-text); }
.summary-stat .value.accent { color: var(--jfa-turquoise); }

.budget-bar-wrapper { flex: 1; min-width: 200px; max-width: 350px; }
.budget-bar-track { background: #E8EAED; height: 8px; width: 100%; }
.budget-bar-fill { height: 100%; background: var(--jfa-turquoise); transition: width 0.5s ease; }

/* Legend */
.legend {
  padding: 12px 32px; display: flex; gap: 20px; flex-wrap: wrap;
  align-items: center; background: var(--jfa-white); border-bottom: 1px solid var(--jfa-border);
}

.legend-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--jfa-text-secondary);
}

.legend-dot { width: 10px; height: 10px; }

/* === TIER-BASED ORG CHART === */
.org-container { padding: 32px 16px; overflow-x: auto; }

.org-chart {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 1100px;
}

/* Each tier is a horizontal row */
.tier {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 20px;
  width: 100%;
  position: relative;
  z-index: 1;
}

.tier-label {
  font-family: 'Norwester', Impact, sans-serif;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #C0C4CC;
  margin-bottom: 8px;
  text-align: center;
}

.tier-spacer {
  height: 48px;
  position: relative;
  width: 100%;
}

/* Co-leadership wrapper */
.co-leader-row {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  gap: 0;
  position: relative;
}

.co-leader-row::before {
  content: '';
  position: absolute;
  top: -2px; left: 20px; right: 20px; bottom: -2px;
  border: 2px dashed var(--jfa-turquoise-mid);
  pointer-events: none;
  z-index: 0;
}

.co-leader-badge {
  font-family: 'Norwester', Impact, sans-serif;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--jfa-turquoise);
  background: var(--jfa-turquoise-light);
  padding: 3px 14px;
  position: absolute;
  top: -14px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  white-space: nowrap;
}

.co-leader-divider {
  display: flex; align-items: center; justify-content: center;
  padding: 0 10px; align-self: stretch; z-index: 1;
  font-size: 14px; font-weight: 700; color: var(--jfa-turquoise);
}

/* Manager grouping labels */
.manager-group {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.manager-group-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #AAA;
  margin-bottom: 6px;
}

.manager-group-cards {
  display: flex;
  gap: 16px;
  justify-content: center;
}

.group-separator {
  width: 1px;
  background: var(--jfa-border);
  align-self: stretch;
  margin: 0 12px;
}

/* Card styles */
.card {
  background: var(--jfa-card-bg);
  border: 1px solid var(--jfa-border);
  border-top: 4px solid var(--dept-leadership);
  padding: 14px 18px;
  width: 210px;
  position: relative;
  transition: all 0.2s ease;
  cursor: default;
  z-index: 1;
}

.card:hover {
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  transform: translateY(-2px);
}

.card.highlight {
  box-shadow: 0 0 0 3px var(--jfa-turquoise), 0 4px 16px rgba(0,141,185,0.25);
}

.card.dimmed { opacity: 0.25; }

.card .name {
  font-family: 'Norwester', Impact, sans-serif;
  font-size: 15px; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--jfa-text);
  margin-bottom: 2px;
}

.card .role {
  font-size: 11px; color: var(--jfa-text-secondary);
  margin-bottom: 6px; line-height: 1.3;
}

.card .pay { font-size: 13px; font-weight: 700; color: var(--jfa-text); }

.card .pay-detail {
  font-size: 10px; color: var(--jfa-text-secondary); margin-top: 1px;
}

.card .badge {
  display: inline-block; font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
  padding: 2px 6px; margin-top: 5px;
}

.badge.w2 { background: var(--jfa-turquoise-light); color: var(--jfa-turquoise); }
.badge.contractor { background: #FFF3E0; color: #D4760A; }
.badge.open { background: #FFF9C4; color: #9E8600; }
.badge.remote { background: #EDE7F6; color: #6B5B95; }

.card.dept-leadership { border-top-color: var(--dept-leadership); }
.card.dept-education { border-top-color: var(--dept-education); }
.card.dept-operations { border-top-color: var(--dept-operations); }
.card.dept-fb { border-top-color: var(--dept-fb); }
.card.dept-finance { border-top-color: var(--dept-finance); }
.card.dept-sound { border-top-color: var(--dept-sound); }

.card.board-card {
  background: var(--jfa-gray); color: var(--jfa-white);
  border-top: 4px solid var(--jfa-turquoise);
  text-align: center; width: 260px;
}

.card.board-card .name { color: var(--jfa-white); }
.card.board-card .role { color: rgba(255,255,255,0.7); }

/* SVG connector lines */
.connectors-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

.connectors-svg line {
  stroke: var(--jfa-border);
  stroke-width: 2;
}

.connectors-svg line.leader-line {
  stroke: var(--jfa-turquoise-mid);
  stroke-width: 2;
  stroke-dasharray: 6 4;
}

/* Print */
@media print {
  .header-controls, .search-box, .toggle-btn, .legend, .no-print { display: none !important; }
  body { background: white; }
  .header { background: white; color: black; border-bottom: 3px solid var(--jfa-turquoise); }
  .logo { color: var(--jfa-turquoise); }
  .logo span { color: black; }
  .header h1 { color: black; }
  .summary-bar { border-bottom: 1px solid #ccc; }
  .card { box-shadow: none; border: 1px solid #ccc; }
  .card:hover { transform: none; box-shadow: none; }
  .co-leader-row::before { border-color: #ccc; }
}

@media (max-width: 768px) {
  .header { padding: 16px; }
  .summary-bar { padding: 12px 16px; gap: 16px; }
  .org-container { padding: 16px 8px; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="logo">Jazz Forum Arts<span>Tarrytown, NY</span></div>
    <h1>Organizational Chart</h1>
  </div>
  <div class="header-controls">
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search name or role..." oninput="handleSearch(this.value)" />
    </div>
    <button class="toggle-btn active" id="btnBase" onclick="toggleView('base')">Base Pay</button>
    <button class="toggle-btn" id="btnLoaded" onclick="toggleView('loaded')">Fully Loaded</button>
    <button class="toggle-btn no-print" onclick="window.print()">Print</button>
  </div>
</div>

<!-- Summary Bar -->
<div class="summary-bar" id="summaryBar"></div>

<!-- Legend -->
<div class="legend">
  <span style="font-size:11px;font-weight:700;color:var(--jfa-text);text-transform:uppercase;letter-spacing:1px;">Departments:</span>
  <div class="legend-item"><div class="legend-dot" style="background:var(--dept-leadership)"></div> Leadership</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--dept-education)"></div> Education</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--dept-sound)"></div> Sound</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--dept-operations)"></div> Operations</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--dept-fb)"></div> Food & Beverage</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--dept-finance)"></div> Finance</div>
</div>

<!-- Org Chart -->
<div class="org-container">
  <div class="org-chart" id="orgChart"></div>
</div>

<script>
const EMPLOYER_TAX_RATE = 0.0965;

const people = [
  { id: 'board', name: 'Board of Directors', role: 'Governing Body', dept: 'leadership', base: 0, type: 'board', reportsTo: null, tier: 0 },

  { id: 'darrian', name: 'Darrian', role: 'Executive Director', dept: 'leadership', base: 120000, type: 'w2', reportsTo: 'board', tier: 1 },
  { id: 'clara', name: 'Clara', role: 'Chief Operating Officer', dept: 'leadership', base: 120000, type: 'w2', reportsTo: 'board', tier: 1 },

  // Tier 2 — Managers (report to Darrian)
  { id: 'giulia', name: 'Giulia', role: 'Education & Programs Coordinator', dept: 'education', base: 62400, type: 'w2', reportsTo: 'darrian', tier: 2 },
  { id: 'dev_mgr', name: 'Open Hire', role: 'Development Manager', dept: 'leadership', base: 85000, type: 'open', reportsTo: 'darrian', tier: 2 },
  { id: 'cfo', name: 'Open Hire', role: 'Fractional CFO', dept: 'finance', base: 78000, type: 'open', reportsTo: 'darrian', tier: 2 },

  // Tier 2 — Managers (report to Clara)
  { id: 'isak', name: 'Isak', role: 'Operations & Marketing Manager', dept: 'operations', base: 102000, type: 'w2', reportsTo: 'clara', tier: 2, remote: 'Amsterdam', payNote: 'All-in (Remote)' },
  { id: 'john_chef', name: 'John', role: 'Chef', dept: 'fb', base: 85100, type: 'w2', reportsTo: 'clara', tier: 2 },
  { id: 'aerial', name: 'Aerial', role: 'FOH Manager', dept: 'fb', base: 76960, type: 'w2', reportsTo: 'clara', tier: 2 },

  // Tier 3 — Staff
  { id: 'cam', name: 'Cam', role: 'Sound Engineer', dept: 'sound', base: 46800, type: '1099', reportsTo: 'darrian', tier: 3, payNote: '$900/week' },
  { id: 'neal', name: 'Neal', role: 'Education Staff', dept: 'education', base: 48000, type: '1099', reportsTo: 'giulia', tier: 3 },
  { id: 'boyce', name: 'Boyce', role: 'Education Staff', dept: 'education', base: 48000, type: '1099', reportsTo: 'giulia', tier: 3 },
  { id: 'boh', name: 'BOH Staff', role: 'Kitchen, Prep, Dishwashers', dept: 'fb', base: 0, type: 'hourly', reportsTo: 'john_chef', tier: 3, payNote: 'Variable / Hourly' },
  { id: 'foh', name: 'FOH Staff', role: 'Waiters, Bussers, Bartenders', dept: 'fb', base: 0, type: 'hourly', reportsTo: 'aerial', tier: 3, payNote: 'Variable / Hourly' },
];

let viewMode = 'base';

function getFullyLoaded(p) {
  if (p.type === 'w2' && p.id !== 'isak') return Math.round(p.base * (1 + EMPLOYER_TAX_RATE));
  return p.base;
}

function fmt(n) { return n === 0 ? '—' : '$' + n.toLocaleString('en-US'); }

function renderCardHTML(p) {
  const pay = viewMode === 'loaded' ? getFullyLoaded(p) : p.base;

  let badgeHTML = '';
  if (p.type === 'w2') badgeHTML = '<span class="badge w2">W-2</span>';
  else if (p.type === '1099') badgeHTML = '<span class="badge contractor">1099</span>';
  else if (p.type === 'open') badgeHTML = '<span class="badge open">Open Position</span>';
  if (p.remote) badgeHTML += ' <span class="badge remote">Remote</span>';

  let payHTML = '';
  if (p.type === 'board') {
    payHTML = '';
  } else if (p.payNote && p.base > 0) {
    payHTML = `<div class="pay">${fmt(pay)}<span style="font-size:10px;font-weight:500;color:var(--jfa-text-secondary)"> /yr</span></div><div class="pay-detail">${p.payNote}</div>`;
  } else if (p.payNote) {
    payHTML = `<div class="pay-detail">${p.payNote}</div>`;
  } else if (pay > 0) {
    payHTML = `<div class="pay">${fmt(pay)}<span style="font-size:10px;font-weight:500;color:var(--jfa-text-secondary)"> /yr</span></div>`;
    if (viewMode === 'loaded' && p.type === 'w2' && p.id !== 'isak') {
      payHTML += `<div class="pay-detail">Base: ${fmt(p.base)}</div>`;
    }
  }

  const isBoard = p.type === 'board';
  const cardClass = isBoard ? 'card board-card' : `card dept-${p.dept}`;

  return `<div class="${cardClass}" data-id="${p.id}" data-name="${p.name.toLowerCase()}" data-role="${p.role.toLowerCase()}">
    <div class="name">${p.name}</div>
    <div class="role">${p.role}</div>
    ${payHTML}
    ${badgeHTML}
  </div>`;
}

function renderChart() {
  const board = people.find(p => p.tier === 0);
  const leaders = people.filter(p => p.tier === 1);
  const darrian = leaders.find(p => p.id === 'darrian');
  const clara = leaders.find(p => p.id === 'clara');

  const t2Darrian = people.filter(p => p.tier === 2 && p.reportsTo === 'darrian');
  const t2Clara = people.filter(p => p.tier === 2 && p.reportsTo === 'clara');

  const t3 = people.filter(p => p.tier === 3);

  // Group tier 3 by manager for visual grouping
  const t3Groups = {};
  t3.forEach(p => {
    const mgr = p.reportsTo;
    if (!t3Groups[mgr]) t3Groups[mgr] = [];
    t3Groups[mgr].push(p);
  });

  let html = '';

  // Tier 0 — Board
  html += `<div class="tier-label">Governance</div>`;
  html += `<div class="tier">${renderCardHTML(board)}</div>`;
  html += `<div class="tier-spacer"></div>`;

  // Tier 1 — Co-Leadership
  html += `<div class="tier-label">Co-Leadership</div>`;
  html += `<div class="tier">
    <div class="co-leader-row">
      <div class="co-leader-badge">Co-Leaders</div>
      ${renderCardHTML(darrian)}
      <div class="co-leader-divider">&amp;</div>
      ${renderCardHTML(clara)}
    </div>
  </div>`;
  html += `<div class="tier-spacer"></div>`;

  // Tier 2 — Managers
  html += `<div class="tier-label">Managers</div>`;
  html += `<div class="tier">
    <div class="manager-group">
      <div class="manager-group-label">Reports to Darrian</div>
      <div class="manager-group-cards">
        ${t2Darrian.map(p => renderCardHTML(p)).join('')}
      </div>
    </div>
    <div class="group-separator"></div>
    <div class="manager-group">
      <div class="manager-group-label">Reports to Clara</div>
      <div class="manager-group-cards">
        ${t2Clara.map(p => renderCardHTML(p)).join('')}
      </div>
    </div>
  </div>`;
  html += `<div class="tier-spacer"></div>`;

  // Tier 3 — Staff
  html += `<div class="tier-label">Staff</div>`;
  const t3Entries = [];
  // Order: Cam (reports to Darrian), Neal & Boyce (reports to Giulia), BOH (John), FOH (Aerial)
  const t3Order = ['darrian', 'giulia', 'john_chef', 'aerial'];
  t3Order.forEach(mgr => {
    if (t3Groups[mgr]) {
      const mgrPerson = people.find(p => p.id === mgr);
      t3Entries.push({ mgr: mgrPerson.name, people: t3Groups[mgr] });
    }
  });

  html += `<div class="tier">`;
  t3Entries.forEach((group, i) => {
    if (i > 0) html += `<div class="group-separator"></div>`;
    html += `<div class="manager-group">
      <div class="manager-group-label">Reports to ${group.mgr}</div>
      <div class="manager-group-cards">
        ${group.people.map(p => renderCardHTML(p)).join('')}
      </div>
    </div>`;
  });
  html += `</div>`;

  document.getElementById('orgChart').innerHTML = html;

  // Draw connector lines after layout
  requestAnimationFrame(() => drawConnectors());

  updateSummary();
}

function drawConnectors() {
  // Remove old SVG
  const old = document.querySelector('.connectors-svg');
  if (old) old.remove();

  const chart = document.getElementById('orgChart');
  const chartRect = chart.getBoundingClientRect();

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.classList.add('connectors-svg');
  svg.setAttribute('width', chart.scrollWidth);
  svg.setAttribute('height', chart.scrollHeight);
  svg.style.position = 'absolute';
  svg.style.top = '0';
  svg.style.left = '0';

  // Draw lines from each person to their manager
  people.forEach(p => {
    if (!p.reportsTo) return;

    const childEl = chart.querySelector(`[data-id="${p.id}"]`);
    const parentEl = chart.querySelector(`[data-id="${p.reportsTo}"]`);
    if (!childEl || !parentEl) return;

    const cRect = childEl.getBoundingClientRect();
    const pRect = parentEl.getBoundingClientRect();

    const x1 = pRect.left + pRect.width / 2 - chartRect.left;
    const y1 = pRect.bottom - chartRect.top;
    const x2 = cRect.left + cRect.width / 2 - chartRect.left;
    const y2 = cRect.top - chartRect.top;

    // Draw elbow connector: down from parent, then horizontal, then down to child
    const midY = y1 + (y2 - y1) / 2;

    const isLeaderLine = p.tier === 1;
    const cls = isLeaderLine ? 'leader-line' : '';

    // Vertical from parent down to midpoint
    const line1 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line1.setAttribute('x1', x1); line1.setAttribute('y1', y1);
    line1.setAttribute('x2', x1); line1.setAttribute('y2', midY);
    if (cls) line1.classList.add(cls);
    svg.appendChild(line1);

    // Horizontal at midpoint
    const line2 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line2.setAttribute('x1', x1); line2.setAttribute('y1', midY);
    line2.setAttribute('x2', x2); line2.setAttribute('y2', midY);
    if (cls) line2.classList.add(cls);
    svg.appendChild(line2);

    // Vertical from midpoint down to child
    const line3 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line3.setAttribute('x1', x2); line3.setAttribute('y1', midY);
    line3.setAttribute('x2', x2); line3.setAttribute('y2', y2);
    if (cls) line3.classList.add(cls);
    svg.appendChild(line3);
  });

  chart.appendChild(svg);
}

function updateSummary() {
  const w2 = people.filter(p => p.type === 'w2');
  const contractors = people.filter(p => p.type === '1099');
  const totalBase = people.reduce((sum, p) => sum + p.base, 0);
  const totalLoaded = people.reduce((sum, p) => sum + getFullyLoaded(p), 0);
  const display = viewMode === 'loaded' ? totalLoaded : totalBase;
  const budgetCap = 1000000;
  const utilization = ((display / budgetCap) * 100).toFixed(1);
  const employerTax = totalLoaded - totalBase;

  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-stat"><span class="label">W-2 Employees</span><span class="value">${w2.length}</span></div>
    <div class="summary-stat"><span class="label">1099 Contractors</span><span class="value">${contractors.length}</span></div>
    <div class="summary-stat"><span class="label">${viewMode === 'loaded' ? 'Total Fully Loaded' : 'Total Base Payroll'}</span><span class="value accent">${fmt(display)}</span></div>
    <div class="summary-stat"><span class="label">Employer Tax Estimate</span><span class="value">${fmt(Math.round(employerTax))}</span></div>
    <div class="summary-stat"><span class="label">Budget Cap</span><span class="value">${fmt(budgetCap)}</span></div>
    <div class="summary-stat budget-bar-wrapper">
      <span class="label">Utilization: ${utilization}%</span>
      <div class="budget-bar-track">
        <div class="budget-bar-fill" style="width:${Math.min(utilization, 100)}%;${parseFloat(utilization) > 95 ? 'background:#D4760A;' : ''}${parseFloat(utilization) > 100 ? 'background:#B5395B;' : ''}"></div>
      </div>
    </div>
  `;
}

function toggleView(mode) {
  viewMode = mode;
  document.getElementById('btnBase').classList.toggle('active', mode === 'base');
  document.getElementById('btnLoaded').classList.toggle('active', mode === 'loaded');
  renderChart();
}

function handleSearch(query) {
  const cards = document.querySelectorAll('.card[data-id]');
  if (!query.trim()) {
    cards.forEach(c => c.classList.remove('highlight', 'dimmed'));
    return;
  }
  const q = query.toLowerCase();
  let hasMatch = false;
  cards.forEach(c => {
    const name = c.getAttribute('data-name') || '';
    const role = c.getAttribute('data-role') || '';
    if (name.includes(q) || role.includes(q)) {
      c.classList.add('highlight');
      c.classList.remove('dimmed');
      hasMatch = true;
    } else {
      c.classList.remove('highlight');
      c.classList.add('dimmed');
    }
  });
  if (!hasMatch) cards.forEach(c => c.classList.remove('dimmed'));
}

// Redraw connectors on resize
window.addEventListener('resize', () => requestAnimationFrame(drawConnectors));

renderChart();
</script>

</body>
