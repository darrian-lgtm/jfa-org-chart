<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jazz Forum Arts — Organizational Chart</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap');

  @font-face {
    font-family: 'Norwester';
    src: url('https://cdn.jsdelivr.net/gh/jamiewilson/predawn@master/fonts/norwester.otf') format('opentype');
    font-weight: normal;
    font-style: normal;
  }

  :root {
    --jfa-black: #000000;
    --jfa-gray: #2D2D2D;
    --jfa-turquoise: #008DB9;
    --jfa-white: #FFFFFF;
    --jfa-open: #C75000;
    --line-color: #555555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--jfa-black);
    color: var(--jfa-white);
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    min-height: 100vh;
    overflow-x: auto;
  }

  header {
    padding: 32px 40px 0 40px;
    display: flex;
    align-items: center;
    gap: 18px;
  }

  header .logo-text {
    font-family: 'Norwester', Impact, 'Arial Black', sans-serif;
    text-transform: uppercase;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--jfa-turquoise);
  }

  header .subtitle {
    font-family: 'Norwester', Impact, 'Arial Black', sans-serif;
    text-transform: uppercase;
    font-size: 16px;
    letter-spacing: 1px;
    color: var(--jfa-white);
    opacity: 0.7;
  }

  h1 {
    font-family: 'Norwester', Impact, 'Arial Black', sans-serif;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 32px;
    text-align: center;
    padding: 28px 0 8px 0;
    color: var(--jfa-white);
  }

  /* ——— SVG Canvas ——— */
  .chart-wrapper {
    width: 100%;
    overflow-x: auto;
    padding: 0 20px 20px 20px;
  }

  svg.org-chart {
    display: block;
    margin: 0 auto;
  }

  /* ——— Footer ——— */
  .payroll-footer {
    background: var(--jfa-gray);
    text-align: center;
    padding: 22px 20px;
    margin-top: 12px;
    border-radius: 0;
  }

  .payroll-footer .label {
    font-family: 'Norwester', Impact, 'Arial Black', sans-serif;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-size: 15px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 6px;
  }

  .payroll-footer .amount {
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 28px;
    color: var(--jfa-turquoise);
  }

  .payroll-footer .budget {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
  }

  .payroll-footer .bar-track {
    width: 340px;
    max-width: 90%;
    height: 10px;
    background: rgba(255,255,255,0.12);
    margin: 12px auto 0 auto;
    border-radius: 0;
    overflow: hidden;
  }

  .payroll-footer .bar-fill {
    height: 100%;
    width: 85.186%;
    background: var(--jfa-turquoise);
    border-radius: 0;
  }

  /* ——— Tooltip ——— */
  .tooltip {
    position: fixed;
    pointer-events: none;
    background: var(--jfa-gray);
    border: 2px solid var(--jfa-turquoise);
    color: var(--jfa-white);
    padding: 12px 16px;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 500;
    max-width: 260px;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.15s;
    border-radius: 0;
    line-height: 1.5;
  }
  .tooltip.visible { opacity: 1; }
</style>
</head>
<body>

<header>
  <span class="logo-text">Jazz Forum Arts</span>
  <span class="subtitle">Tarrytown, NY</span>
</header>

<h1>Organizational Chart</h1>

<div class="chart-wrapper">
  <svg class="org-chart" id="orgSvg" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div class="payroll-footer">
  <div class="label">Total Annual Payroll</div>
  <div class="amount">$851,860</div>
  <div class="budget">of $1,000,000 budget cap &nbsp;·&nbsp; 85.2% utilized &nbsp;·&nbsp; $148,140 remaining</div>
  <div class="bar-track"><div class="bar-fill"></div></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
(function () {
  /* ——————————————————————————————————
     DATA
  —————————————————————————————————— */
  const TURQUOISE = '#008DB9';
  const GRAY      = '#2D2D2D';
  const OPEN_CLR  = '#C75000';
  const WHITE     = '#FFFFFF';
  const LINE_CLR  = '#555555';

  const nodes = [
    { id: 'board',    name: 'Board of Directors', title: '', salary: '', color: TURQUOISE, textColor: WHITE, parent: null, note: 'Governing body' },
    { id: 'ed',       name: 'Darrian', title: 'Executive Director', salary: '$120,000', color: TURQUOISE, textColor: WHITE, parent: 'board', note: '' },
    { id: 'coo',      name: 'Clara', title: 'Chief Operating Officer', salary: '$120,000', color: TURQUOISE, textColor: WHITE, parent: 'board', note: '' },
    { id: 'dev',      name: 'Open Hire', title: 'Development Manager', salary: '$85,000', color: OPEN_CLR, textColor: WHITE, parent: 'ed', note: 'Position unfilled' },
    { id: 'edu',      name: 'Giulia', title: 'Education & Programs Coordinator', salary: '$62,400', color: GRAY, textColor: WHITE, parent: 'ed', note: '' },
    { id: 'cam',      name: 'Cam', title: 'Sound Engineer', salary: '$17,600', color: GRAY, textColor: WHITE, parent: 'ed', note: '' },
    { id: 'johne',    name: 'John', title: 'Sound Engineer', salary: '$8,800', color: GRAY, textColor: WHITE, parent: 'ed', note: '' },
    { id: 'cfo',      name: 'External', title: 'Fractional CFO', salary: '$78,000', color: GRAY, textColor: WHITE, parent: 'ed', note: 'External / fractional' },
    { id: 'neal',     name: 'Neal', title: 'Education Staff', salary: '$48,000', color: GRAY, textColor: WHITE, parent: 'edu', note: '' },
    { id: 'boyce',    name: 'Boyce', title: 'Education Staff', salary: '$48,000', color: GRAY, textColor: WHITE, parent: 'edu', note: '' },
    { id: 'ops',      name: 'Isak', title: 'Operations & Marketing Manager', salary: '$102,000', color: GRAY, textColor: WHITE, parent: 'coo', note: 'Remote — Amsterdam · $102K all-in' },
    { id: 'chef',     name: 'John', title: 'Chef', salary: '$85,100', color: GRAY, textColor: WHITE, parent: 'coo', note: 'Includes $2,000 bonus' },
    { id: 'foh',      name: 'Aerial', title: 'FOH Manager', salary: '$76,960', color: GRAY, textColor: WHITE, parent: 'coo', note: '' },
    { id: 'fohstaff', name: 'FOH Staff', title: 'Waiters · Bussers · Bartenders', salary: '', color: GRAY, textColor: WHITE, parent: 'foh', note: 'Variable / hourly' },
  ];

  /* ——————————————————————————————————
     LAYOUT ENGINE
  —————————————————————————————————— */
  const BOX_W = 180, BOX_H = 80, H_GAP = 28, V_GAP = 60;
  const BOARD_W = 220, BOARD_H = 52;
  const LEADER_W = 200, LEADER_H = 80;

  // Build children map
  const childrenOf = {};
  nodes.forEach(n => { childrenOf[n.id] = []; });
  nodes.forEach(n => { if (n.parent) childrenOf[n.parent].push(n.id); });

  const nodeMap = {};
  nodes.forEach(n => { nodeMap[n.id] = n; });

  // Recursive width of subtree
  function subtreeWidth(id) {
    const kids = childrenOf[id];
    if (kids.length === 0) return BOX_W;
    let total = 0;
    kids.forEach((k, i) => {
      total += subtreeWidth(k);
      if (i < kids.length - 1) total += H_GAP;
    });
    return Math.max(BOX_W, total);
  }

  // Positions map: { id: { x, y, w, h } }
  const pos = {};

  function layoutChildren(parentId, cx, y) {
    const kids = childrenOf[parentId];
    if (kids.length === 0) return;
    let totalW = 0;
    kids.forEach((k, i) => {
      totalW += subtreeWidth(k);
      if (i < kids.length - 1) totalW += H_GAP;
    });
    let startX = cx - totalW / 2;
    kids.forEach(k => {
      const sw = subtreeWidth(k);
      const childCx = startX + sw / 2;
      const w = BOX_W, h = BOX_H;
      pos[k] = { x: childCx - w / 2, y: y, w, h, cx: childCx, cy: y + h / 2 };
      layoutChildren(k, childCx, y + h + V_GAP);
      startX += sw + H_GAP;
    });
  }

  // Lay out board first
  const edSubW = subtreeWidth('ed');
  const cooSubW = subtreeWidth('coo');
  const totalLeaderW = edSubW + H_GAP + cooSubW;
  const canvasCx = Math.max(totalLeaderW / 2 + 40, 600);

  // Board
  pos['board'] = { x: canvasCx - BOARD_W / 2, y: 20, w: BOARD_W, h: BOARD_H, cx: canvasCx, cy: 20 + BOARD_H / 2 };

  // ED & COO as co-equals below board
  const leaderY = 20 + BOARD_H + V_GAP;
  const edCx = canvasCx - (edSubW / 2 + H_GAP / 2 + cooSubW / 2) + edSubW / 2;
  const cooCx = edCx + edSubW / 2 + H_GAP + cooSubW / 2;

  pos['ed'] = { x: edCx - LEADER_W / 2, y: leaderY, w: LEADER_W, h: LEADER_H, cx: edCx, cy: leaderY + LEADER_H / 2 };
  pos['coo'] = { x: cooCx - LEADER_W / 2, y: leaderY, w: LEADER_W, h: LEADER_H, cx: cooCx, cy: leaderY + LEADER_H / 2 };

  layoutChildren('ed', edCx, leaderY + LEADER_H + V_GAP);
  layoutChildren('coo', cooCx, leaderY + LEADER_H + V_GAP);

  /* ——————————————————————————————————
     RENDER
  —————————————————————————————————— */
  // Compute SVG bounds
  let minX = Infinity, maxX = -Infinity, maxY = -Infinity;
  Object.values(pos).forEach(p => {
    if (p.x < minX) minX = p.x;
    if (p.x + p.w > maxX) maxX = p.x + p.w;
    if (p.y + p.h > maxY) maxY = p.y + p.h;
  });
  const PAD = 30;
  const svgW = maxX - minX + PAD * 2;
  const svgH = maxY + PAD * 2;

  const svg = document.getElementById('orgSvg');
  svg.setAttribute('width', svgW);
  svg.setAttribute('height', svgH);
  svg.setAttribute('viewBox', `${minX - PAD} ${-PAD} ${svgW} ${svgH}`);

  function svgEl(tag, attrs) {
    const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);
    return el;
  }

  // Draw connector lines first
  const linesG = svgEl('g', {});
  svg.appendChild(linesG);

  nodes.forEach(n => {
    if (!n.parent) return;
    const p = pos[n.parent];
    const c = pos[n.id];
    if (!p || !c) return;
    const midY = p.y + p.h + (c.y - p.y - p.h) / 2;
    const path = `M ${p.cx} ${p.y + p.h} L ${p.cx} ${midY} L ${c.cx} ${midY} L ${c.cx} ${c.y}`;
    linesG.appendChild(svgEl('path', { d: path, stroke: LINE_CLR, 'stroke-width': '2', fill: 'none' }));
  });

  // Draw boxes
  const boxesG = svgEl('g', {});
  svg.appendChild(boxesG);

  const tooltip = document.getElementById('tooltip');

  nodes.forEach(n => {
    const p = pos[n.id];
    if (!p) return;
    const g = svgEl('g', { 'data-id': n.id, style: 'cursor:pointer' });

    // Shadow
    g.appendChild(svgEl('rect', {
      x: p.x + 3, y: p.y + 3, width: p.w, height: p.h,
      fill: 'rgba(0,0,0,0.35)', rx: 0
    }));

    // Box
    let stroke = 'none', strokeW = '0';
    if (n.id === 'dev') { stroke = OPEN_CLR; strokeW = '2'; }
    g.appendChild(svgEl('rect', {
      x: p.x, y: p.y, width: p.w, height: p.h,
      fill: n.color, rx: 0, stroke, 'stroke-width': strokeW
    }));

    // Open-hire dashed overlay stripe
    if (n.id === 'dev') {
      const defs = svgEl('defs', {});
      const pat = svgEl('pattern', { id: 'diag', width: 8, height: 8, patternUnits: 'userSpaceOnUse', patternTransform: 'rotate(45)' });
      pat.appendChild(svgEl('line', { x1: 0, y1: 0, x2: 0, y2: 8, stroke: 'rgba(255,255,255,0.06)', 'stroke-width': 4 }));
      defs.appendChild(pat);
      g.appendChild(defs);
      g.appendChild(svgEl('rect', { x: p.x, y: p.y, width: p.w, height: p.h, fill: 'url(#diag)', rx: 0 }));
    }

    // Text
    const isBoard = n.id === 'board';
    const fontSize = isBoard ? 14 : 12;
    const lineH = isBoard ? 18 : 16;

    const lines = [];
    if (n.name) lines.push({ text: n.name, bold: true });
    if (n.title) lines.push({ text: n.title, bold: false });
    if (n.salary) lines.push({ text: n.salary, bold: false });

    const totalTextH = lines.length * lineH;
    let textY = p.y + (p.h - totalTextH) / 2 + lineH * 0.75;

    lines.forEach(l => {
      const txt = svgEl('text', {
        x: p.cx, y: textY,
        'text-anchor': 'middle',
        fill: n.textColor,
        'font-family': l.bold ? "'Norwester', Impact, 'Arial Black', sans-serif" : "'Montserrat', sans-serif",
        'font-size': l.bold ? fontSize + 1 : fontSize - 1,
        'font-weight': l.bold ? 'normal' : '500',
        'text-transform': l.bold ? 'uppercase' : 'none',
        'letter-spacing': l.bold ? '0.5px' : '0'
      });
      txt.textContent = l.text;
      g.appendChild(txt);
      textY += lineH;
    });

    // Hover interaction
    g.addEventListener('mouseenter', (e) => {
      const nd = nodeMap[n.id];
      let html = `<strong style="color:${TURQUOISE};font-size:14px">${nd.name}</strong>`;
      if (nd.title) html += `<br>${nd.title}`;
      if (nd.salary) html += `<br>Salary: ${nd.salary}`;
      if (nd.note) html += `<br><em style="color:rgba(255,255,255,0.6)">${nd.note}</em>`;
      const kids = childrenOf[n.id];
      if (kids.length) html += `<br>Direct reports: ${kids.length}`;
      tooltip.innerHTML = html;
      tooltip.classList.add('visible');
    });
    g.addEventListener('mousemove', (e) => {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY + 14) + 'px';
    });
    g.addEventListener('mouseleave', () => {
      tooltip.classList.remove('visible');
    });

    boxesG.appendChild(g);
  });

  // Legend at bottom-right of SVG
  const legY = maxY - 10;
  const legX = maxX - 190;
  const legG = svgEl('g', {});
  svg.appendChild(legG);

  const legendItems = [
    { color: TURQUOISE, label: 'Board / Leadership' },
    { color: OPEN_CLR, label: 'Open Position' },
    { color: GRAY, label: 'Staff' },
  ];

  legendItems.forEach((item, i) => {
    legG.appendChild(svgEl('rect', { x: legX, y: legY + i * 22, width: 14, height: 14, fill: item.color, rx: 0 }));
    const t = svgEl('text', { x: legX + 22, y: legY + i * 22 + 12, fill: WHITE, 'font-family': "'Montserrat', sans-serif", 'font-size': '12', 'font-weight': '500' });
    t.textContent = item.label;
    legG.appendChild(t);
  });

})();
</script>
</body>
</html>
